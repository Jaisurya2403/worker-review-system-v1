<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Store Login — WorkerReview</title>
  <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="css/black-red-theme-override.css"/></head>


<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-circle">🏪</div>
      <h1 class="auth-title">Store Login</h1>
      <p class="auth-subtitle">Sign in to manage your team reviews</p>
    </div>
    <div id="alert-area"></div>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter your username" autocomplete="off" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="off"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">Sign In</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:.85rem;color:var(--gray-500);">
      <a href="index.html" style="color:var(--primary);">← Back to Home</a>
    </p>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script>
  if (localStorage.getItem('storeToken')) window.location.href = 'store-dashboard.html';
  window.addEventListener("pageshow", function () {

    document.getElementById("username").value = "";
    document.getElementById("password").value = "";

});

  async function handleLogin(e) {
    e.preventDefault();
    const btn  = document.getElementById('login-btn');
    const area = document.getElementById('alert-area');
    area.innerHTML = '';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in...';

    try {
      const res  = await fetch(`${API_BASE}/store/login`, {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        const type = data.error === 'subscription_expired' ? 'warning' : 'danger';
        area.innerHTML = `<div class="alert alert-${type}">${escapeHtml(data.message || data.error)}</div>`;
        return;
      }

      localStorage.setItem('storeToken',    data.token);
      localStorage.setItem('storeUsername', data.username);
      localStorage.setItem('storeName',     data.store_name);
      localStorage.setItem('storeId',       data.store_id);
      window.location.href = 'store-dashboard.html';
    } catch {
      area.innerHTML = `<div class="alert alert-danger">Cannot connect to server. Make sure the backend is running.</div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }

  }
</script>
</body>
</html>
